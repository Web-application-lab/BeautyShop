<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BeautyShop</title>
    <link rel="stylesheet" href="variables.css"/>
    <link rel="stylesheet" href="navbar.css"/>
</head>
<body>

    <!-- ════════════════════════════════
         TOP NAV
    ════════════════════════════════ -->
    <header class="top-nav">

        <a href="#" class="top-nav__logo">BeautyShop</a>

        <div class="top-nav__search">
            <div class="search-box">
                <svg class="search-box__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input class="search-box__input" type="text" placeholder="Бүтээгдэхүүн хайх..."/>
            </div>
        </div>

        <div class="top-nav__actions">
            <button class="icon-btn" aria-label="Wishlist">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                             a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                             1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </button>

            <button class="icon-btn" aria-label="Cart">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
            </button>

            <button class="login-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span class="login-btn__text">Нэвтрэх</span>
            </button>
        </div>

    </header>

    <!-- ════════════════════════════════
         CATEGORY NAV
    ════════════════════════════════ -->
    <nav class="cat-nav">

        <button class="cat-nav__all-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6"  x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            <span class="cat-nav__all-btn-text">Бүх бүтээгдэхүүн</span>
        </button>

        <ul class="cat-nav__list">
            <li><a href="#">Арьс арчилгаа</a></li>
            <li><a href="#">Нүүр будалт</a></li>
            <li><a href="#">Нарны хамгаалалт</a></li>
            <li><a href="#">Бие арчилгаа</a></li>
            <li><a href="#">Үс арчилгаа</a></li>
            <li><a href="#">Брэнд</a></li>
        </ul>

        <button class="cat-nav__more-btn" aria-label="Дэлгэрэнгүй">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>

    </nav>

    <!-- ════════════════════════════════
         HERO (demo)
    ════════════════════════════════ -->
    <section class="hero">
        <h1 class="hero__title">Таны гоо сайхны дэлгүүр</h1>
        <p class="hero__sub">Арьс, нүүр, бие — бүхнийг нэг дороос</p>
    </section>

</body>
</html>
