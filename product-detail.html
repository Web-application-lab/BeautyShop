<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/f23fece6f2.js" crossorigin="anonymous"></script>

  <title>Product detail</title>
  <style>
    
    :root {
      --pink-light: #fce4ec;
      --pink-mid: #f8bbd0;
      --product-rating: #fbc02d;
      --gradient-section: linear-gradient(90deg, #fce4ec, #f8bbd0);
      --radius-lg: 24px;
      --radius-full: 9999px;
      --shadow-card: 0 4px 24px rgba(233,30,140,0.08);
      --shadow-hover: 0 8px 40px rgba(233,30,140,0.18);
      --text-light: #999;
      --sale-rate: #930000; 
  }

    body{
      font-family: "Inter", sans-serif;
      background-color: #ffffff;
    }

    .hero {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;

    }

    main.container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    main section h2{
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #000000;
      margin-bottom: 20px;
    }

    section {margin-bottom: 60px;}
    .discount-product {margin-top: 40px;}
    .high-rated {margin-bottom: 20px}

    .strip{
      display:flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 10px;
      justify-content: center;
    }

    .strip-item{
      width: 180px;
      gap: 8px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      transition: transform 0.2s;
    }

    .strip-label {
      display: block;
      font-size: 12px;
    }
    
    .strip-circle{
      width: 50px;
      height: 50px;
      border-radius: 70%;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .strip-circle img {width: 50px;}

    .strip-button{background: none; border: none; cursor: pointer; text-align: center;}
    .strip-button:hover .strip-circle{transition: 0.3s; transform: translateY(-10%);}
    .strip-button:hover .strip-circle{color: #fce4ec; font-weight: 600px;}
    

    .products {
      display: flex;
      overflow-x: auto;
      padding: 10px;
      gap:10px;
    }
    .product-body {position: relative; overflow: hidden;}

    .products::-webkit-scrollbar{display: none;}
    
    .product-card {background: #fff;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    padding: 16px;
    position: relative; transition: all 0.3s; min-width: 220px; flex-shrink: 0; scroll-snap-align: start; padding-left: 12px; padding-right: 12px;}

    .product-card:hover{transform: translateY(-6px); box-shadow: var(--shadow-hover);}
    .product-image {height: 150px; display: flex;  align-items: center; justify-content: center;}
    .product-image img{width: 200%; max-width: 150px; object-fit: contain;}
   
    .product-actions {
      display: flex; 
      gap: 10px; 
      margin-top: 10px;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: transform 0.2s; 
    }
    .product-card:hover .product-actions{opacity: 1; pointer-events: auto; transform: translateY(0);}
      .product-actions .add-cart {display: flex; align-items: center; justify-content: center;width: 70px; height: 35px; background: linear-gradient(90deg, #fce4ec, #f8bbd0); border: none; border-radius: 12px; padding: 12px;}
      .product-actions .wishlist{display: flex; align-items: center; justify-content: center;width: 70px; height: 35px; background: linear-gradient(90deg, #fce4ec, #f8bbd0); border: none; border-radius: 12px; padding: 12px;}


    .product-menu {
      position: absolute;
      top: 16px;
      right: 16px;
      border: none;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 6px 10px;
      }
    
    .product-rating i {color: var(--product-rating)}
    .product-rating {font-size: 12px;}
    .product-title {font-size: 14px; margin: 5px}
    .product-brand {margin: 5px;font-size: 12px; color: var(--text-light); }
    .old-price {font-size: 12px; color: var(--text-light); text-decoration: line-through;}
    .sale-rate {font-size: 14px; color: var(--sale-rate); display:inline-block; border: 1px solid #b71212;border-radius:100px; padding:1px 5px;}

    .product-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      border: none;
      background: #f5f5f5;
      padding: 6px 14px;
      border-radius: 14px;
    }

    .detail-right img {
        display:flex;
        max-width: 10px;
        max-height: 10px;
        object-fit: contain;
    }
  </style>

</head>
<body>
<section class="product-detail">
    <div class="detail-left">
        <img src="images/Jumiso-Cream.jpg" alt="Jumiso-cream">
    </div>

    <div class="detail-right">
        <div class="product-body">
        <h3 class="product-title">Snail Mucin 88 + Peptide Cream</h3>
        <p class="product-brand">Jumiso</p>
        </div>
    </div>
</section>
</body>
</html>
